<!-- ============================================ -->
<!-- SUBCATEGORIES - Fixed Carousel              -->
<!-- ============================================ -->
<style>
    /* ============================================ */
    /* SUBCATEGORIES SECTION                       */
    /* ============================================ */
    .subcategory-section {
        margin-bottom: 50px;
        padding: 0 15px;
        max-width: 1460px;
        margin-left: auto;
        margin-right: auto;
    }

    .subcategory-section.no-subcategories {
        display: none !important;
    }

    /* ============================================ */
    /* HEADER - Centered No Underline              */
    /* ============================================ */
    .subcategory-header {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 0;
        border-bottom: none;
        position: relative;
    }

    .subcategory-header .subcategory-title {
        font-family: 'Playfair Display', serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--text-dark);
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin: 0;
    }

    .subcategory-header .subcategory-title .icon-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(92,18,31,0.06);
        color: var(--primary);
        font-size: 16px;
    }

    /* ============================================ */
    /* SUBCATEGORY CAROUSEL WRAPPER                */
    /* ============================================ */
    .subcategory-carousel-wrapper {
        position: relative;
        overflow: hidden;
        padding: 10px 0 5px;
    }

    .subcategory-carousel-track {
        display: flex;
        gap: 24px;
        transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        will-change: transform;
        justify-content: flex-start;
        flex-wrap: nowrap;
        padding: 0 4px;
    }

    /* When less than or equal to items that fit - NO CAROUSEL */
    .subcategory-carousel-track.centered {
        justify-content: center;
        flex-wrap: wrap;
        gap: 24px;
        transform: none !important;
    }

    /* ============================================ */
    /* SUBCATEGORY CARD - Fresh Design             */
    /* ============================================ */
    .subcategory-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        padding: 0;
        position: relative;
        cursor: pointer;
        flex: 0 0 auto;
        width: 100%;
        max-width: 130px;
        min-width: 90px;
        padding-bottom: 8px;
    }

    .subcategory-card:hover {
        transform: translateY(-6px);
    }

    /* ============================================ */
    /* SUBCATEGORY IMAGE - Round                   */
    /* ============================================ */
    .subcategory-card .sub-image-wrap {
        width: 100%;
        aspect-ratio: 1/1;
        max-width: 100px;
        border-radius: 50%;
        overflow: hidden;
        background: #f8f6f4;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        position: relative;
        border: 3px solid #eeebe8;
        margin-bottom: 10px;
        padding: 10px;
    }

    .subcategory-card:hover .sub-image-wrap {
        border-color: var(--secondary);
        transform: scale(1.04);
        box-shadow: 0 4px 25px rgba(244,180,0,0.06);
    }

    .subcategory-card .sub-image-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.5s ease;
        border-radius: 50%;
    }

    .subcategory-card:hover .sub-image-wrap img {
        transform: scale(1.08);
    }

    .subcategory-card .sub-image-wrap .no-image-icon {
        font-size: 26px;
        color: #ccc;
        transition: all 0.4s ease;
    }

    .subcategory-card:hover .sub-image-wrap .no-image-icon {
        color: var(--secondary);
        transform: scale(1.1);
    }

    /* ============================================ */
    /* SUBCATEGORY NAME                            */
    /* ============================================ */
    .subcategory-card .sub-name {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-dark);
        text-align: center;
        transition: color 0.3s ease;
        line-height: 1.2;
        margin: 0;
        width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .subcategory-card:hover .sub-name {
        color: var(--primary);
    }

    /* ============================================ */
    /* SUBCATEGORY COUNT                           */
    /* ============================================ */
    .subcategory-card .sub-count {
        font-family: 'Inter', sans-serif;
        font-size: 10px;
        color: var(--text-light);
        text-align: center;
        margin-top: 3px;
        transition: all 0.3s ease;
        background: rgba(92,18,31,0.04);
        padding: 1px 12px;
        border-radius: 20px;
    }

    .subcategory-card:hover .sub-count {
        background: var(--secondary);
        color: var(--text-dark);
    }

    /* ============================================ */
    /* NAVIGATION ARROWS                           */
    /* ============================================ */
    .subcategory-nav {
        position: absolute;
        top: 45%;
        transform: translateY(-50%);
        z-index: 10;
        border-radius: 50%;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(10px);
        border: 2px solid var(--border);
        color: var(--primary);
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        box-shadow: 0 2px 20px rgba(0,0,0,0.04);
        width: 38px;
        height: 38px;
        font-size: 14px;
        opacity: 0;
        pointer-events: none;
    }

    .subcategory-carousel-wrapper:hover .subcategory-nav {
        opacity: 1;
        pointer-events: all;
    }

    .subcategory-nav:hover {
        background: var(--primary);
        color: #fff;
        transform: translateY(-50%) scale(1.08);
        border-color: var(--primary);
        box-shadow: 0 4px 25px rgba(92,18,31,0.12);
    }

    .subcategory-nav.prev {
        left: -10px;
    }

    .subcategory-nav.next {
        right: -10px;
    }

    /* ============================================ */
    /* DOTS INDICATORS                             */
    /* ============================================ */
    .subcategory-dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 18px;
        padding-bottom: 5px;
    }

    .subcategory-dots .dot {
        border-radius: 50%;
        background: rgba(92,18,31,0.08);
        cursor: pointer;
        transition: all 0.4s ease;
        border: none;
        padding: 0;
        width: 8px;
        height: 8px;
    }

    .subcategory-dots .dot.active {
        background: var(--primary);
        transform: scale(1.3);
        box-shadow: 0 0 20px rgba(92,18,31,0.08);
    }

    .subcategory-dots .dot:hover {
        background: rgba(92,18,31,0.25);
        transform: scale(1.15);
    }

    .subcategory-dots .dot.active:hover {
        background: var(--primary);
        transform: scale(1.3);
    }

    /* ============================================ */
    /* EMPTY STATE                                 */
    /* ============================================ */
    .empty-state {
        text-align: center;
        padding: 50px 20px;
        background: var(--bg-white);
        border-radius: 14px;
        border: 1.5px dashed var(--border);
    }

    .empty-state i {
        font-size: 40px;
        color: var(--text-light);
        opacity: 0.2;
        display: block;
        margin-bottom: 10px;
    }

    .empty-state h5 {
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: var(--text-dark);
        margin-bottom: 4px;
    }

    .empty-state p {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        color: var(--text-light);
        margin: 0;
    }

    /* ============================================ */
    /* RESPONSIVE - Carousel always works          */
    /* ============================================ */

    @media (min-width: 1200px) {
        .subcategory-card { max-width: 130px; min-width: 100px; }
        .subcategory-card .sub-image-wrap { max-width: 100px; }
        .subcategory-card .sub-name { font-size: 13px; }
        .subcategory-carousel-track { gap: 24px; }
        .subcategory-carousel-track.centered { gap: 24px; }
    }

    @media (max-width: 1199px) and (min-width: 992px) {
        .subcategory-card { max-width: 120px; min-width: 90px; }
        .subcategory-card .sub-image-wrap { max-width: 90px; padding: 8px; }
        .subcategory-card .sub-name { font-size: 12px; }
        .subcategory-carousel-track { gap: 20px; }
        .subcategory-carousel-track.centered { gap: 20px; }
        .subcategory-nav { width: 34px; height: 34px; font-size: 13px; }
    }

    @media (max-width: 991px) and (min-width: 768px) {
        .subcategory-card { max-width: 110px; min-width: 80px; }
        .subcategory-card .sub-image-wrap { max-width: 82px; padding: 6px; border-width: 2px; }
        .subcategory-card .sub-name { font-size: 12px; }
        .subcategory-card .sub-count { font-size: 9px; }
        .subcategory-carousel-track { gap: 18px; }
        .subcategory-carousel-track.centered { gap: 18px; }
        .subcategory-nav { width: 32px; height: 32px; font-size: 12px; opacity: 1; pointer-events: all; }
        .subcategory-nav.prev { left: -4px; }
        .subcategory-nav.next { right: -4px; }
        .subcategory-carousel-wrapper:hover .subcategory-nav { opacity: 1; }
        .subcategory-dots { gap: 6px; margin-top: 14px; }
        .subcategory-dots .dot { width: 7px; height: 7px; }
        .subcategory-header .subcategory-title { font-size: 24px; }
        .subcategory-header .subcategory-title .icon-wrap { width: 36px; height: 36px; font-size: 15px; }
    }

    @media (max-width: 767px) and (min-width: 576px) {
        .subcategory-card { max-width: 100px; min-width: 75px; }
        .subcategory-card .sub-image-wrap { max-width: 75px; padding: 5px; border-width: 2px; }
        .subcategory-card .sub-name { font-size: 11px; }
        .subcategory-card .sub-count { font-size: 8px; }
        .subcategory-carousel-track { gap: 16px; }
        .subcategory-carousel-track.centered { gap: 16px; }
        .subcategory-nav { width: 28px; height: 28px; font-size: 11px; opacity: 1; pointer-events: all; }
        .subcategory-nav.prev { left: -2px; }
        .subcategory-nav.next { right: -2px; }
        .subcategory-carousel-wrapper:hover .subcategory-nav { opacity: 1; }
        .subcategory-dots { gap: 5px; margin-top: 12px; }
        .subcategory-dots .dot { width: 6px; height: 6px; }
        .subcategory-header .subcategory-title { font-size: 22px; }
        .subcategory-header .subcategory-title .icon-wrap { width: 34px; height: 34px; font-size: 14px; }
    }

    @media (max-width: 575px) and (min-width: 401px) {
        .subcategory-card { max-width: 90px; min-width: 65px; }
        .subcategory-card .sub-image-wrap { max-width: 68px; padding: 5px; border-width: 2px; }
        .subcategory-card .sub-name { font-size: 10px; }
        .subcategory-card .sub-count { font-size: 8px; padding: 1px 8px; }
        .subcategory-carousel-track { gap: 14px; }
        .subcategory-carousel-track.centered { gap: 14px; }
        .subcategory-nav { width: 26px; height: 26px; font-size: 10px; opacity: 1; pointer-events: all; }
        .subcategory-nav.prev { left: 0px; }
        .subcategory-nav.next { right: 0px; }
        .subcategory-carousel-wrapper:hover .subcategory-nav { opacity: 1; }
        .subcategory-dots { gap: 5px; margin-top: 10px; }
        .subcategory-dots .dot { width: 5px; height: 5px; }
        .subcategory-header .subcategory-title { font-size: 20px; }
        .subcategory-header .subcategory-title .icon-wrap { width: 30px; height: 30px; font-size: 13px; }
        .subcategory-header { margin-bottom: 22px; }
    }

    @media (max-width: 400px) {
        .subcategory-card { max-width: 80px; min-width: 55px; }
        .subcategory-card .sub-image-wrap { max-width: 58px; padding: 4px; border-width: 2px; }
        .subcategory-card .sub-name { font-size: 9px; }
        .subcategory-card .sub-count { font-size: 7px; padding: 0 6px; }
        .subcategory-carousel-track { gap: 12px; }
        .subcategory-carousel-track.centered { gap: 12px; }
        .subcategory-nav { width: 24px; height: 24px; font-size: 9px; opacity: 1; pointer-events: all; }
        .subcategory-nav.prev { left: 0px; }
        .subcategory-nav.next { right: 0px; }
        .subcategory-carousel-wrapper:hover .subcategory-nav { opacity: 1; }
        .subcategory-dots { gap: 4px; margin-top: 8px; }
        .subcategory-dots .dot { width: 4px; height: 4px; }
        .subcategory-header .subcategory-title { font-size: 18px; }
        .subcategory-header .subcategory-title .icon-wrap { width: 28px; height: 28px; font-size: 12px; }
        .subcategory-header { margin-bottom: 18px; }
    }

    @media (max-width: 320px) {
        .subcategory-card { max-width: 65px; min-width: 45px; }
        .subcategory-card .sub-image-wrap { max-width: 48px; padding: 3px; border-width: 1.5px; }
        .subcategory-card .sub-name { font-size: 8px; }
        .subcategory-card .sub-count { font-size: 6px; padding: 0 4px; }
        .subcategory-carousel-track { gap: 10px; }
        .subcategory-carousel-track.centered { gap: 10px; }
        .subcategory-nav { display: none; }
        .subcategory-dots { gap: 3px; margin-top: 6px; }
        .subcategory-dots .dot { width: 3px; height: 3px; }
        .subcategory-header .subcategory-title { font-size: 16px; }
        .subcategory-header .subcategory-title .icon-wrap { width: 24px; height: 24px; font-size: 10px; }
    }

    /* ============================================ */
    /* TOUCH DEVICE OPTIMIZATION                   */
    /* ============================================ */
    @media (hover: none) {
        .subcategory-nav {
            opacity: 1;
            pointer-events: all;
        }
        .subcategory-card:hover {
            transform: none;
        }
        .subcategory-card:hover .sub-image-wrap {
            transform: none;
        }
        .subcategory-card:hover .sub-image-wrap img {
            transform: none;
        }
    }
</style>

<!-- ============================================ -->
<!-- SUBCATEGORIES SECTION - HTML                 -->
<!-- ============================================ -->
{% if subcategories %}
<div class="subcategory-section">
    <!-- Header - Centered No Underline -->
    <div class="subcategory-header">
        <h3 class="subcategory-title">
            <span class="icon-wrap"><i class="fas fa-tags"></i></span>
            Shop by Subcategory
        </h3>
    </div>

    <!-- Carousel -->
    <div class="subcategory-carousel-wrapper" id="subcategoryCarousel">
        <div class="subcategory-carousel-track" id="subcategoryTrack">
            {% for subcategory in subcategories %}
                <a href="{% url 'Ecom:subcategory_shop' subcategory.slug %}" class="subcategory-card">
                    <div class="sub-image-wrap">
                        {% if subcategory.image %}
                            <img src="{{ subcategory.image.url }}" alt="{{ subcategory.name }}" loading="lazy">
                        {% else %}
                            <span class="no-image-icon"><i class="fas fa-folder"></i></span>
                        {% endif %}
                    </div>
                    <div class="sub-name">{{ subcategory.name }}</div>
                    <span class="sub-count">{{ subcategory.product_count }} items</span>
                </a>
            {% endfor %}
        </div>

        <!-- Navigation Arrows - Show if more items than fit in one row -->
        <button class="subcategory-nav prev" onclick="slideSubcategories(-1)" aria-label="Previous">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="subcategory-nav next" onclick="slideSubcategories(1)" aria-label="Next">
            <i class="fas fa-chevron-right"></i>
        </button>

        <!-- Dots Indicators -->
        <div class="subcategory-dots" id="subcategoryDots"></div>
    </div>
</div>
{% endif %}

<!-- ============================================ -->
<!-- JAVASCRIPT - Subcategory Carousel           -->
<!-- ============================================ -->
<script>
    (function() {
        const track = document.getElementById('subcategoryTrack');
        if (!track) return;

        const cards = track.querySelectorAll('.subcategory-card');
        const totalCards = cards.length;
        let currentSlide = 0;
        let cardsPerSlide = 6;
        let totalSlides = Math.ceil(totalCards / cardsPerSlide);

        function getCardsPerSlide() {
            const w = window.innerWidth;
            if (w >= 1200) return 6;
            if (w >= 992) return 6;
            if (w >= 768) return 5;
            if (w >= 576) return 4;
            if (w >= 401) return 3;
            if (w >= 321) return 3;
            return 2;
        }

        function getGap() {
            const w = window.innerWidth;
            if (w >= 1200) return 24;
            if (w >= 992) return 20;
            if (w >= 768) return 18;
            if (w >= 576) return 16;
            if (w >= 401) return 14;
            if (w >= 321) return 12;
            return 10;
        }

        function updateSlide() {
            cardsPerSlide = getCardsPerSlide();
            totalSlides = Math.ceil(totalCards / cardsPerSlide);
            
            if (currentSlide >= totalSlides) currentSlide = totalSlides - 1;
            if (currentSlide < 0) currentSlide = 0;
            
            // If total cards fit in one row, center them - NO CAROUSEL
            if (totalCards <= cardsPerSlide) {
                track.classList.add('centered');
                track.style.transform = 'translateX(0px)';
                document.querySelectorAll('.subcategory-nav').forEach(function(el) { 
                    el.style.display = 'none'; 
                });
                const dotsContainer = document.getElementById('subcategoryDots');
                if (dotsContainer) dotsContainer.innerHTML = '';
                return;
            } else {
                track.classList.remove('centered');
                document.querySelectorAll('.subcategory-nav').forEach(function(el) { 
                    el.style.display = 'flex'; 
                });
                const dotsContainer = document.getElementById('subcategoryDots');
                if (dotsContainer) {
                    dotsContainer.style.display = 'flex';
                }
            }

            const gap = getGap();
            const cardWidth = cards[0].offsetWidth + gap;
            const offset = currentSlide * cardsPerSlide * cardWidth;
            track.style.transform = 'translateX(-' + offset + 'px)';

            const dots = document.querySelectorAll('#subcategoryDots .dot');
            dots.forEach(function(dot, index) {
                dot.classList.toggle('active', index === currentSlide);
            });

            const prevBtn = document.querySelector('.subcategory-nav.prev');
            const nextBtn = document.querySelector('.subcategory-nav.next');
            if (prevBtn) prevBtn.style.display = currentSlide === 0 ? 'none' : 'flex';
            if (nextBtn) nextBtn.style.display = currentSlide >= totalSlides - 1 ? 'none' : 'flex';
        }

        window.slideSubcategories = function(direction) {
            const newSlide = currentSlide + direction;
            if (newSlide >= 0 && newSlide < totalSlides) {
                currentSlide = newSlide;
                updateSlide();
            }
        };

        window.goToSubcategorySlide = function(index) {
            if (index >= 0 && index < totalSlides) {
                currentSlide = index;
                updateSlide();
            }
        };

        function createDots() {
            const dotsContainer = document.getElementById('subcategoryDots');
            if (!dotsContainer) return;
            dotsContainer.innerHTML = '';
            
            cardsPerSlide = getCardsPerSlide();
            
            // Only create dots if categories don't fit in one row
            if (totalCards <= cardsPerSlide) {
                dotsContainer.style.display = 'none';
                return;
            }
            
            totalSlides = Math.ceil(totalCards / cardsPerSlide);
            dotsContainer.style.display = 'flex';
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('button');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dot.onclick = function(index) {
                    return function() { window.goToSubcategorySlide(index); };
                }(i);
                dotsContainer.appendChild(dot);
            }
        }

        // Initialize
        setTimeout(function() {
            createDots();
            updateSlide();
        }, 100);

        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() {
                createDots();
                updateSlide();
            }, 200);
        });

        // Touch swipe support
        let touchStartX = 0;
        const wrapper = document.getElementById('subcategoryCarousel');
        if (wrapper) {
            wrapper.addEventListener('touchstart', function(e) {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            wrapper.addEventListener('touchend', function(e) {
                const diff = touchStartX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0 && currentSlide < totalSlides - 1) {
                        window.slideSubcategories(1);
                    } else if (diff < 0 && currentSlide > 0) {
                        window.slideSubcategories(-1);
                    }
                }
            }, { passive: true });
        }
    })();
</script>
