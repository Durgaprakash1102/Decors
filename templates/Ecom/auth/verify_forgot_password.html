{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password - MyStore{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-lock fa-3x text-warning"></i>
                        <h3 class="mt-3">Reset Password</h3>
                        <p class="text-muted">
                            OTP sent to<br>
                            <strong>{{ email }}</strong>
                        </p>
                    </div>
                    
                    <form method="POST" novalidate>
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="otp_code" class="form-label">Enter OTP</label>
                            <input type="text" name="otp_code" id="otp_code" 
                                   class="form-control text-center otp-input" 
                                   placeholder="Enter 6-digit OTP" 
                                   maxlength="6" pattern="[0-9]{6}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="new_password" class="form-label">New Password</label>
                            <input type="password" name="new_password" id="new_password" 
                                   class="form-control" placeholder="Enter new password" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <input type="password" name="confirm_password" id="confirm_password" 
                                   class="form-control" placeholder="Confirm new password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="fas fa-check-circle"></i> Reset Password
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    <div class="text-center">
                        <p class="mb-0">
                            <a href="{% url 'Ecom:login' %}" class="text-primary">
                                <i class="fas fa-arrow-left"></i> Back to Login
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const otpInput = document.getElementById('otp_code');
        if (otpInput) {
            otpInput.focus();
            otpInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        }
    });
</script>
{% endblock %}
