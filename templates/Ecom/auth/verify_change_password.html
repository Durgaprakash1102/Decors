{% extends 'base.html' %}
{% load static %}

{% block title %}Verify Change Password - MyStore{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-shield-alt fa-3x text-primary"></i>
                        <h3 class="mt-3">Verify Password Change</h3>
                        <p class="text-muted">
                            OTP sent to<br>
                            <strong>{{ email }}</strong>
                        </p>
                    </div>
                    
                    <form method="POST" novalidate>
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="otp_code" class="form-label">Enter OTP</label>
                            <input type="text" name="otp_code" id="otp_code" 
                                   class="form-control text-center otp-input" 
                                   placeholder="Enter 6-digit OTP" 
                                   maxlength="6" pattern="[0-9]{6}" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-check-circle"></i> Verify & Change Password
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    <div class="text-center">
                        <p class="mb-0">
                            <a href="{% url 'Ecom:profile' %}" class="text-primary">
                                <i class="fas fa-arrow-left"></i> Back to Profile
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const otpInput = document.getElementById('otp_code');
        if (otpInput) {
            otpInput.focus();
            otpInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        }
    });
</script>
{% endblock %}
